syntax: v1
schema:
  name: billing-service
  description: Billing service configuration
  fields:
    billing.enabled:
      type: bool
      description: Master switch for billing
    billing.provider:
      type: string
      description: Payment provider
      constraints:
        enum: [stripe, braintree, manual]
    billing.retry_limit:
      type: integer
      description: Max payment retry attempts
      constraints:
        minimum: 0
        maximum: 10
    billing.timeout:
      type: duration
      description: Payment processing timeout
tenant:
  name: billing-prod
config:
  description: Production billing defaults
  values:
    billing.enabled:
      value: true
    billing.provider:
      value: stripe
    billing.retry_limit:
      value: 3
    billing.timeout:
      value: "30s"
locks:
  - field_path: billing.provider
