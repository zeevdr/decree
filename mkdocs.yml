site_name: OpenDecree
site_description: Schema-driven business configuration management
repo_url: https://github.com/zeevdr/decree
repo_name: zeevdr/decree

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Overview: concepts/overview.md
      - Schemas & Fields: concepts/schemas-and-fields.md
      - Tenants: concepts/tenants.md
      - Typed Values: concepts/typed-values.md
      - Versioning: concepts/versioning.md
      - Authentication: concepts/auth.md
      - Subscriptions: concepts/subscriptions.md
  - API Reference: api/api-reference.md
  - SDKs: sdk.md
  - CLI Reference:
      - decree: cli/decree.md
      - Schema:
          - decree schema: cli/decree_schema.md
          - decree schema create: cli/decree_schema_create.md
          - decree schema get: cli/decree_schema_get.md
          - decree schema list: cli/decree_schema_list.md
          - decree schema publish: cli/decree_schema_publish.md
          - decree schema delete: cli/decree_schema_delete.md
          - decree schema export: cli/decree_schema_export.md
          - decree schema import: cli/decree_schema_import.md
      - Tenant:
          - decree tenant: cli/decree_tenant.md
          - decree tenant create: cli/decree_tenant_create.md
          - decree tenant get: cli/decree_tenant_get.md
          - decree tenant list: cli/decree_tenant_list.md
          - decree tenant delete: cli/decree_tenant_delete.md
      - Config:
          - decree config: cli/decree_config.md
          - decree config get: cli/decree_config_get.md
          - decree config get-all: cli/decree_config_get-all.md
          - decree config set: cli/decree_config_set.md
          - decree config set-many: cli/decree_config_set-many.md
          - decree config versions: cli/decree_config_versions.md
          - decree config rollback: cli/decree_config_rollback.md
          - decree config export: cli/decree_config_export.md
          - decree config import: cli/decree_config_import.md
      - Watch: cli/decree_watch.md
      - Lock:
          - decree lock: cli/decree_lock.md
          - decree lock set: cli/decree_lock_set.md
          - decree lock remove: cli/decree_lock_remove.md
          - decree lock list: cli/decree_lock_list.md
      - Audit:
          - decree audit: cli/decree_audit.md
          - decree audit query: cli/decree_audit_query.md
          - decree audit usage: cli/decree_audit_usage.md
          - decree audit unused: cli/decree_audit_unused.md
  - Use Cases:
      - Config as Code: usecases/config-as-code.md
  - Server:
      - Configuration: server/configuration.md
      - Deployment: server/deployment.md
      - Observability: server/observability.md
