site_name: Central Config Service
site_description: Schema-driven business configuration management
repo_url: https://github.com/zeevdr/central-config-service
repo_name: zeevdr/central-config-service

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Overview: concepts/overview.md
      - Schemas & Fields: concepts/schemas-and-fields.md
      - Tenants: concepts/tenants.md
      - Typed Values: concepts/typed-values.md
      - Versioning: concepts/versioning.md
      - Authentication: concepts/auth.md
      - Subscriptions: concepts/subscriptions.md
  - API Reference: api/api-reference.md
  - SDKs: sdk.md
  - CLI Reference:
      - ccs: cli/ccs.md
      - Schema:
          - ccs schema: cli/ccs_schema.md
          - ccs schema create: cli/ccs_schema_create.md
          - ccs schema get: cli/ccs_schema_get.md
          - ccs schema list: cli/ccs_schema_list.md
          - ccs schema publish: cli/ccs_schema_publish.md
          - ccs schema delete: cli/ccs_schema_delete.md
          - ccs schema export: cli/ccs_schema_export.md
          - ccs schema import: cli/ccs_schema_import.md
      - Tenant:
          - ccs tenant: cli/ccs_tenant.md
          - ccs tenant create: cli/ccs_tenant_create.md
          - ccs tenant get: cli/ccs_tenant_get.md
          - ccs tenant list: cli/ccs_tenant_list.md
          - ccs tenant delete: cli/ccs_tenant_delete.md
      - Config:
          - ccs config: cli/ccs_config.md
          - ccs config get: cli/ccs_config_get.md
          - ccs config get-all: cli/ccs_config_get-all.md
          - ccs config set: cli/ccs_config_set.md
          - ccs config set-many: cli/ccs_config_set-many.md
          - ccs config versions: cli/ccs_config_versions.md
          - ccs config rollback: cli/ccs_config_rollback.md
          - ccs config export: cli/ccs_config_export.md
          - ccs config import: cli/ccs_config_import.md
      - Watch: cli/ccs_watch.md
      - Lock:
          - ccs lock: cli/ccs_lock.md
          - ccs lock set: cli/ccs_lock_set.md
          - ccs lock remove: cli/ccs_lock_remove.md
          - ccs lock list: cli/ccs_lock_list.md
      - Audit:
          - ccs audit: cli/ccs_audit.md
          - ccs audit query: cli/ccs_audit_query.md
          - ccs audit usage: cli/ccs_audit_usage.md
          - ccs audit unused: cli/ccs_audit_unused.md
  - Server:
      - Configuration: server/configuration.md
      - Deployment: server/deployment.md
      - Observability: server/observability.md
