# CI pipeline for OpenDecree server, SDKs, and CLI.
#
# Jobs: changes ──┬── tools → lint, docs, e2e, examples ──→ check (alls-green gate)
#                 └── test ─────────────────────────────────┘
# The changes job runs dorny/paths-filter; lint, test, e2e, examples skip on docs-only PRs.
# The tools job builds/caches the Docker image used by lint, docs, e2e, examples.
# The check job aggregates all results for branch protection (skipped jobs are allowed).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  TOOLS_IMAGE: ghcr.io/${{ github.repository_owner }}/decree-tools

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - 'proto/**'
              - 'db/**'
              - 'build/**'
              - 'Makefile'
              - 'docker-compose*.yml'
              - '.github/workflows/**'

  tools:
    name: Tools image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Compute Dockerfile hash
        id: hash
        run: echo "tag=sha-$(sha256sum build/Dockerfile.tools | head -c 12)" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "${{ env.TOOLS_IMAGE }}:${{ steps.hash.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      - name: Log in to ghcr.io
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tools image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile.tools
          push: true
          tags: ${{ env.TOOLS_IMAGE }}:${{ steps.hash.outputs.tag }}

    outputs:
      image: ${{ env.TOOLS_IMAGE }}:${{ steps.hash.outputs.tag }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [tools, changes]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Fetch main branch for buf breaking
        if: github.ref != 'refs/heads/main'
        run: git fetch origin main:main

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0

      - name: Pull tools image
        run: |
          docker pull "${{ needs.tools.outputs.image }}"
          docker tag "${{ needs.tools.outputs.image }}" decree-tools
          touch .tools-image-built

      - name: Proto lint + breaking
        run: make lint-proto

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Build server + CLI
        run: |
          go build -o bin/decree-server ./cmd/server
          cd cmd/decree && go build -o ../../bin/decree .

      - name: Unit tests
        run: go test ./internal/... -race -count=1

      - name: SDK + CLI + tools tests
        run: |
          cd sdk/configclient && go test ./... -count=1 &
          cd sdk/adminclient && go test ./... -count=1 &
          cd sdk/configwatcher && go test ./... -count=1 &
          cd sdk/tools && go test ./... -count=1 &
          cd cmd/decree && go test ./... -count=1 &
          wait

      - name: Coverage ratchet
        run: ./scripts/check-coverage.sh

  docs:
    name: Docs check
    runs-on: ubuntu-latest
    needs: tools
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Pull tools image
        run: |
          docker pull "${{ needs.tools.outputs.image }}"
          docker tag "${{ needs.tools.outputs.image }}" decree-tools
          touch .tools-image-built

      - name: Regenerate docs and OpenAPI spec
        run: make generate docs

      - name: Check docs are up-to-date
        run: |
          if ! git diff --exit-code docs/ cmd/server/openapi.json; then
            echo "::error::Generated docs or OpenAPI spec are out of date. Run 'make generate docs' and commit."
            exit 1
          fi

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [tools, changes]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Pull tools image
        run: docker pull "${{ needs.tools.outputs.image }}" && docker tag "${{ needs.tools.outputs.image }}" decree-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Pre-build server image with layer cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          load: true
          tags: decree-service
          cache-from: type=gha,scope=e2e-server
          cache-to: type=gha,mode=max,scope=e2e-server

      - name: Run E2E tests
        run: |
          docker compose up -d --wait service
          cd e2e && go test -tags=e2e -v -race -count=1 ./... || (cd .. && docker compose down -v && exit 1)
          docker compose down -v
        env:
          TOOLS_IMAGE: ${{ needs.tools.outputs.image }}

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [tools, changes]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"

      - name: Pull tools image
        run: docker pull "${{ needs.tools.outputs.image }}" && docker tag "${{ needs.tools.outputs.image }}" decree-tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: network=host

      - name: Pre-build server image with layer cache
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          load: true
          tags: decree-service
          cache-from: type=gha,scope=e2e-server
          cache-to: type=gha,mode=max,scope=e2e-server

      - name: Run examples
        run: make examples
        env:
          TOOLS_IMAGE: ${{ needs.tools.outputs.image }}

  check:
    name: CI check
    if: always()
    needs: [lint, test, docs, e2e, examples]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: lint, test, e2e, examples
