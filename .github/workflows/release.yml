name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Validate
    uses: ./.github/workflows/ci.yml

  release-notes:
    name: Release notes
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Find previous tag
        id: prev
        run: |
          PREV=$(git tag -l "v*" --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "tag=${PREV:-}" >> $GITHUB_OUTPUT
          echo "Previous tag: ${PREV:-none}"

      - name: Detect proto breaking changes
        id: proto
        if: steps.prev.outputs.tag != ''
        run: |
          make tools 2>/dev/null || true
          BREAKING=$(docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            decree-tools \
            buf breaking --against ".git#tag=${{ steps.prev.outputs.tag }}" 2>&1) || true
          if [ -n "$BREAKING" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "details<<${EOF_MARKER}" >> $GITHUB_OUTPUT
            echo "$BREAKING" >> $GITHUB_OUTPUT
            echo "${EOF_MARKER}" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect SDK API changes
        id: sdk
        if: steps.prev.outputs.tag != ''
        continue-on-error: true
        env:
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/exp/cmd/apidiff@latest
          NOTES=""
          for mod in sdk/configclient sdk/adminclient sdk/configwatcher sdk/tools; do
            MOD_TAG="${mod}/$(echo $GITHUB_REF_NAME)"
            PREV_TAG="${mod}/${{ steps.prev.outputs.tag }}"
            # Check if both tags exist
            if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
              DIFF=$(cd "$mod" && apidiff "$PREV_TAG" "$MOD_TAG" 2>/dev/null) || true
              if [ -n "$DIFF" ]; then
                NOTES="${NOTES}\n### ${mod}\n\`\`\`\n${DIFF}\n\`\`\`\n"
              fi
            fi
          done
          if [ -n "$NOTES" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "details<<${EOF_MARKER}" >> $GITHUB_OUTPUT
            echo -e "$NOTES" >> $GITHUB_OUTPUT
            echo "${EOF_MARKER}" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release body
        id: body
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          {
            if [ "${{ steps.proto.outputs.found }}" = "true" ]; then
              echo "## Proto Breaking Changes"
              echo ""
              echo '```'
              echo "${{ steps.proto.outputs.details }}"
              echo '```'
              echo ""
            fi

            if [ "${{ steps.sdk.outputs.found }}" = "true" ]; then
              echo "## SDK API Changes"
              echo ""
              echo "${{ steps.sdk.outputs.details }}"
              echo ""
            fi

            cat <<INSTALL
          ## Install

          \`\`\`bash
          # CLI
          go install github.com/zeevdr/decree/cmd/decree@${TAG}

          # SDK
          go get github.com/zeevdr/decree/sdk/configclient@${TAG}
          go get github.com/zeevdr/decree/sdk/adminclient@${TAG}

          # Docker
          docker pull ghcr.io/zeevdr/decree:${VERSION}
          docker pull ghcr.io/zeevdr/decree-cli:${VERSION}
          \`\`\`
          INSTALL
          } > /tmp/release-body.md

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "content<<${EOF_MARKER}" >> $GITHUB_OUTPUT
          cat /tmp/release-body.md >> $GITHUB_OUTPUT
          echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes-start-tag "${{ steps.prev.outputs.tag }}" \
            --notes "${{ steps.body.outputs.content }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    name: Build and publish binaries
    runs-on: ubuntu-latest
    needs: release-notes
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bsr:
    name: Push to BSR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          push: true
          push_disable_create: true

  images:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - image: decree
            dockerfile: build/Dockerfile
            context: .
          - image: decree-cli
            dockerfile: build/Dockerfile.decree
            context: .
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-release
