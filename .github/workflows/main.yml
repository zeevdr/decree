name: Main

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pages: write

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: Push bleeding-edge images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: decree
            dockerfile: build/Dockerfile
          - image: decree-cli
            dockerfile: build/Dockerfile.decree
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=main
            COMMIT=${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:main
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'docs/')
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to GitHub Pages
        run: >
          docker run --rm
          -v ${{ github.workspace }}:/docs
          squidfunk/mkdocs-material:9.7.6
          gh-deploy --force
