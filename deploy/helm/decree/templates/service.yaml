apiVersion: v1
kind: Service
metadata:
  name: {{ include "decree.fullname" . }}
  labels:
    {{- include "decree.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- if .Values.config.httpPort }}
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    {{- end }}
  selector:
    {{- include "decree.selectorLabels" . | nindent 4 }}
