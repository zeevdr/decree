version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "dbstore"
        out: "../internal/storage/dbstore"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        output_files_suffix: ".gen"
        output_db_file_name: "db.gen.go"
        output_models_file_name: "models.gen.go"
